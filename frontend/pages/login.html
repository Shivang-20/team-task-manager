<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Task Manager</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card">
        <div class="brand">
          <span class="brand-badge">TT</span>
          <div>
            <strong>Task Manager</strong>
          </div>
        </div>
        <h1 class="page-title">Welcome back</h1>
        <p class="page-subtitle">Sign in to manage your projects and tasks.</p>
        <div id="loginMsg" class="message hide"></div>
        <form id="loginForm" class="form-grid">
          <div class="field">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Your password" required />
          </div>
          <button id="loginSubmit" class="btn-primary" type="submit">Login</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="./signup.html">Sign up</a></p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
