<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | Task Manager</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell">
    <nav id="navbar" class="navbar"></nav>
    <main class="page-container">
      <section class="toolbar">
        <div>
          <h1 class="page-title">Projects</h1>
          <p class="page-subtitle">All active workspaces your team is working on.</p>
        </div>
        <button id="newProjectBtn" class="btn-primary" data-admin-only>+ New Project</button>
      </section>

      <div id="projectsMsg" class="message hide"></div>

      <section id="projectsList" class="grid"></section>
    </main>

    <div id="projectModal" class="modal">
      <div class="modal-card">
        <div class="card-header">
          <h2>New Project</h2>
          <button id="closeProjectModal" class="btn-secondary" type="button">Close</button>
        </div>
        <div id="projectFormMsg" class="message hide"></div>
        <form id="projectForm" class="form-grid">
          <div class="field">
            <label for="title">Project name</label>
            <input id="title" name="title" type="text" placeholder="What are you building?" required />
          </div>
          <div class="field">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" placeholder="Brief overview of the project" required></textarea>
          </div>
          <div class="field">
            <label>Add members</label>
            <div id="memberCheckboxes" class="checkbox-grid"></div>
          </div>
          <button id="submitProjectBtn" class="btn-primary" type="submit">Create Project</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/projects.js"></script>
  </body>
</html>
