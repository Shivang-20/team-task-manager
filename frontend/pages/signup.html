<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Task Manager</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card">
        <div class="brand">
          <span class="brand-badge">TT</span>
          <div>
            <strong>Task Manager</strong>
          </div>
        </div>
        <h1 class="page-title">Create an account</h1>
        <p class="page-subtitle">Choose your role and start collaborating with your team.</p>
        <div id="signupMsg" class="message hide"></div>
        <form id="signupForm" class="form-grid">
          <div class="field">
            <label for="name">Full name</label>
            <input id="name" name="name" type="text" placeholder="Your name" required />
          </div>
          <div class="field">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="6" placeholder="At least 6 characters" required />
          </div>
          <div class="field">
            <label for="role">Role</label>
            <select id="role" name="role">
              <option value="member">Member</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button id="signupSubmit" class="btn-primary" type="submit">Create Account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="./login.html">Login</a></p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/signup.js"></script>
  </body>
</html>
